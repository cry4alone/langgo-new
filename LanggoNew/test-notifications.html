<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification + Game Invite Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; }
        input, button { padding: 8px; margin: 4px; }
        #log { background: #111; color: #0f0; padding: 16px; margin-top: 16px; white-space: pre-wrap; height: 400px; overflow-y: auto; font-size: 13px; }
        .section { border: 1px solid #333; padding: 12px; margin: 12px 0; }
        .status { margin: 8px 0; }
        .connected { color: green; }
        .disconnected { color: red; }
        h4 { margin: 4px 0; }
    </style>
</head>
<body>
    <h3>Notification + Game Invite Test</h3>

    <div>
        <label>JWT Token:</label><br>
        <input type="text" id="token" style="width:100%" placeholder="Bearer eyJhbGci...">
    </div>

    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <div class="status" id="status">Disconnected</div>

    <div class="section">
        <h4>Friend Request</h4>
        <input type="number" id="targetUserId" value="1" style="width:100px" placeholder="Target user ID">
        <button onclick="sendFriendRequest()">Send Friend Request</button>
        <button onclick="respondFriendRequest(1, true)">Accept (requesterId=1)</button>
        <button onclick="respondFriendRequest(1, false)">Decline (requesterId=1)</button>
    </div>

    <div class="section">
        <h4>Game Invite</h4>
        <input type="text" id="roomId" style="width:100%" placeholder="Room ID (from CreateGame)">
        <input type="number" id="inviteUserId" value="1" style="width:100px" placeholder="User to invite">
        <button onclick="invitePlayer()">Invite Player</button>
        <button onclick="respondInvite(true)">Accept Invite</button>
        <button onclick="respondInvite(false)">Decline Invite</button>
        <button onclick="joinGameRoom()">Join Game Room (after accept)</button>
    </div>

    <div id="log"></div>

    <script>
        let connection;
        const API = 'http://localhost:8080';

        function getToken() {
            const raw = document.getElementById('token').value;
            return raw.replace('Bearer ', '');
        }

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(text, connected) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status ' + (connected ? 'connected' : 'disconnected');
        }

        async function connect() {
            const token = getToken();
            connection = new signalR.HubConnectionBuilder()
                .withUrl(`${API}/notifications`, { accessTokenFactory: () => token })
                .withAutomaticReconnect()
                .build();

            connection.on('FriendRequestReceived', (data) => {
                log(`[FRIEND] Received from ${data.fromUsername} (id=${data.fromUserId}), friendshipId=${data.friendshipId}`);
            });

            connection.on('FriendRequestResponse', (data) => {
                log(`[FRIEND] Response: accepted=${data.accepted}, fromUserId=${data.fromUserId}`);
            });

            connection.on('GameInviteReceived', (data) => {
                log(`[GAME INVITE] From host ${data.hostUsername} (id=${data.hostUserId}), room=${data.roomId}`);
                log(`  Settings: ${data.gameSettings.dictionaryName} (${data.gameSettings.langFrom}→${data.gameSettings.langTo}), ${data.gameSettings.roundsAmount} rounds`);
            });

            connection.on('GameInviteDeclined', (data) => {
                log(`[GAME INVITE] Declined by user ${data.invitedUserId}, room=${data.roomId}`);
            });

            connection.onreconnecting(() => setStatus('Reconnecting...', false));
            connection.onreconnected(() => setStatus('Connected', true));
            connection.onclose(() => setStatus('Disconnected', false));

            try {
                await connection.start();
                setStatus('Connected', true);
                log('Connected to /notifications');
            } catch (e) {
                setStatus('Error: ' + e, false);
                log('Connection error: ' + e);
            }
        }

        async function disconnect() {
            if (connection) await connection.stop();
        }

        async function apiPost(path, body) {
            const token = getToken();
            const res = await fetch(`${API}${path}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });
            log(`POST ${path} → ${res.status}`);
            return res;
        }

        // --- Friends ---
        async function sendFriendRequest() {
            const userId = parseInt(document.getElementById('targetUserId').value);
            await apiPost('/friends/requests', { friendId: userId });
        }

        async function respondFriendRequest(requesterId, accept) {
            await apiPost(`/friends/requests/${requesterId}/respond`, { accept });
        }

        // --- Game Invites ---
        async function invitePlayer() {
            const roomId = document.getElementById('roomId').value;
            const userId = parseInt(document.getElementById('inviteUserId').value);
            await apiPost(`/games/rooms/${roomId}/invite`, { userId });
        }

        async function respondInvite(accept) {
            const roomId = document.getElementById('roomId').value;
            await apiPost(`/games/rooms/${roomId}/invite/respond`, { accept });

            if (accept) {
                log('Invite accepted. Now call JoinRoom via GameHub to enter the game.');
            }
        }

        async function joinGameRoom() {
            const roomId = document.getElementById('roomId').value;
            const token = getToken();

            const gameConnection = new signalR.HubConnectionBuilder()
                .withUrl(`${API}/game`, { accessTokenFactory: () => token })
                .build();

            gameConnection.on('ReceiveRoomState', (data) => {
                log(`[GAME] Room state: ${JSON.stringify(data.players.map(p => p.username))}`);
            });

            gameConnection.on('PlayerJoined', (data) => {
                log(`[GAME] Player joined: ${data.username}`);
            });

            gameConnection.on('GameStarted', (time) => {
                log(`[GAME] Game started! Start time: ${time}`);
            });

            try {
                await gameConnection.start();
                await gameConnection.invoke('JoinRoom', roomId);
                log(`Joined game room ${roomId}`);
            } catch (e) {
                log('Game join error: ' + e);
            }
        }
    </script>
</body>
</html>
